<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced WebGL2 Wave Simulation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070a;
            font-family: monospace;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #4af0ff;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>WebGL2 Wave Simulation</strong><br>
        Lighting: Unidirectional Dispersion<br>
        Algorithm: Multi-layered Gerstner Waves
    </div>
    <canvas id="glCanvas"></canvas>

    <script>
        // --- Shaders ---
        const vsSource = `#version 300 es
        in vec2 a_gridPosition;

        uniform float u_time;
        uniform mat4 u_viewMatrix;
        uniform mat4 u_projectionMatrix;

        out vec3 v_worldPosition;
        out vec3 v_normal;
        out vec3 v_viewDir;

        // Gerstner Wave Parameters: vec4(directionX, directionZ, steepness, wavelength)
        const int WAVE_COUNT = 4;
        vec4 waveParams[4] = vec4[](
            vec4(1.0, 0.1, 0.4, 30.0),
            vec4(0.7, 0.7, 0.35, 15.0),
            vec4(-0.2, 0.9, 0.3, 8.0),
            vec4(0.1, 1.0, 0.25, 4.0)
        );

        void main() {
            vec3 gridPos = vec3(a_gridPosition.x, 0.0, a_gridPosition.y);
            vec3 displacedPos = gridPos;
            
            vec3 tangent = vec3(1.0, 0.0, 0.0);
            vec3 binormal = vec3(0.0, 0.0, 1.0);

            float g = 9.81;

            // Accumulate Gerstner Waves
            for(int i = 0; i < WAVE_COUNT; i++) {
                vec2 d = normalize(waveParams[i].xy);
                float steepness = waveParams[i].z;
                float wavelength = waveParams[i].w;
                
                float k = 2.0 * 3.14159265 / wavelength;
                float c = sqrt(g / k); 
                float speed = c * 1.5;
                
                float f = k * (dot(d, gridPos.xz) - speed * u_time);
                float amp = steepness / k;

                displacedPos.x += d.x * (amp * cos(f));
                displacedPos.y += amp * sin(f);
                displacedPos.z += d.y * (amp * cos(f));

                // Calculate derivatives for precise analytical normals
                tangent.x -= d.x * d.x * (steepness * sin(f));
                tangent.y += d.x * (steepness * cos(f));
                tangent.z -= d.x * d.y * (steepness * sin(f));

                binormal.x -= d.x * d.y * (steepness * sin(f));
                binormal.y += d.y * (steepness * cos(f));
                binormal.z -= d.y * d.y * (steepness * sin(f));
            }

            v_normal = normalize(cross(binormal, tangent));
            v_worldPosition = displacedPos;
            
            // Fixed camera position in world space to calculate view direction
            vec3 cameraPos = vec3(0.0, 25.0, 50.0);
            v_viewDir = normalize(cameraPos - displacedPos);

            gl_Position = u_projectionMatrix * u_viewMatrix * vec4(displacedPos, 1.0);
        }
        `;

        const fsSource = `#version 300 es
        precision highp float;

        in vec3 v_worldPosition;
        in vec3 v_normal;
        in vec3 v_viewDir;

        uniform vec3 u_lightDir; // Strictly unidirectional

        out vec4 fragColor;

        void main() {
            vec3 normal = normalize(v_normal);
            vec3 viewDir = normalize(v_viewDir);
            vec3 lightDir = normalize(u_lightDir);

            // 1. Direct Phong Specular (Ocean Highlight)
            vec3 reflectDir = reflect(-lightDir, normal);
            float specPower = 120.0;
            float specularFactor = max(dot(viewDir, reflectDir), 0.0);
            float specular = pow(specularFactor, specPower) * 2.5;

            // 2. Unidirectional Dispersion / Subsurface Scattering
            // Simulates light entering the water and scattering strictly along the light path
            float scatteringFactor = max(dot(lightDir, -viewDir), 0.0);
            float sss = pow(scatteringFactor, 4.0) * vec3(0.0, 0.75, 0.6).g * 0.4;
            
            // Base dark depth color (no ambient light exists in this world)
            vec3 deepWaterColor = vec3(0.01, 0.03, 0.06);
            
            // Light dispersion illumination based on surface slope facing the light direction
            float diffuse = max(dot(normal, lightDir), 0.0);
            vec3 scatteredLightColor = vec3(0.0, 0.4, 0.5) * diffuse * 1.5;

            // Combine components
            vec3 finalColor = deepWaterColor + scatteredLightColor + (vec3(0.0, 0.8, 0.7) * sss) + vec3(specular);

            // Atmospheric absorption/fog based on distance to emphasize isolated light world
            float dist = length(v_worldPosition.xyz - vec3(0.0, 25.0, 50.0));
            float fogFactor = exp(-0.008 * dist);
            finalColor = mix(vec3(0.005, 0.008, 0.015), finalColor, fogFactor);

            // Gamma correction
            finalColor = pow(finalColor, vec3(1.0 / 2.2));

            fragColor = vec4(finalColor, 1.0);
        }
        `;

        // --- Core WebGL Engine Setup ---
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl2');

        if (!gl) {
            alert('WebGL 2 is not supported by your browser.');
        }

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.compileStatus)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vsSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fsSource);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error(gl.getProgramInfoLog(program));
        }

        // --- Grid Generation ---
        const size = 160; 
        const resolution = 256; 
        const vertices = [];
        const indices = [];

        for (let i = 0; i <= resolution; i++) {
            for (let j = 0; j <= resolution; j++) {
                const x = (i / resolution - 0.5) * size;
                const z = (j / resolution - 0.5) * size;
                vertices.push(x, z);
            }
        }

        for (let i = 0; i < resolution; i++) {
            for (let j = 0; j < resolution; j++) {
                const row1 = i * (resolution + 1);
                const row2 = (i + 1) * (resolution + 1);
                
                indices.push(row1 + j, row2 + j, row1 + j + 1);
                indices.push(row1 + j + 1, row2 + j, row2 + j + 1);
            }
        }

        const vao = gl.createVertexArray();
        gl.bindVertexArray(vao);

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(vertices), gl.STATIC_DRAW);

        const positionLoc = gl.getAttribLocation(program, 'a_gridPosition');
        gl.enableVertexAttribArray(positionLoc);
        gl.vertexAttribPointer(positionLoc, 2, gl.FLOAT, false, 0, 0);

        const indexBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indexBuffer);
        gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint32Array(indices), gl.STATIC_DRAW);

        // --- Minimal Matrix Math Inline Helpers ---
        function createPerspectiveMatrix(fovy, aspect, near, far) {
            const f = 1.0 / Math.tan(fovy / 2);
            const nf = 1.0 / (near - far);
            return [
                f / aspect, 0, 0, 0,
                0, f, 0, 0,
                0, 0, (far + near) * nf, -1,
                0, 0, (2 * far * near) * nf, 0
            ];
        }

        function createLookAtMatrix(eye, target, up) {
            const z0 = eye[0] - target[0], z1 = eye[1] - target[1], z2 = eye[2] - target[2];
            const len = 1.0 / Math.sqrt(z0*z0 + z1*z1 + z2*z2);
            const zx = z0*len, zy = z1*len, zz = z2*len;
            
            const x0 = up[1]*zz - up[2]*zy, x1 = up[2]*zx - up[0]*zz, x2 = up[0]*zy - up[1]*zx;
            const lenX = 1.0 / Math.sqrt(x0*x0 + x1*x1 + x2*x2);
            const xx = x0*lenX, xy = x1*lenX, xz = x2*lenX;

            const yx = zy*xz - zz*xy, yy = zz*xx - zx*xz, yz = zx*xy - zy*xx;

            return [
                xx, yx, zx, 0,
                xy, yy, zy, 0,
                xz, yz, zz, 0,
                -(xx*eye[0] + xy*eye[1] + xz*eye[2]),
                -(yx*eye[0] + yy*eye[1] + yz*eye[2]),
                -(zx*eye[0] + zy*eye[1] + zz*eye[2]), 1
            ];
        }

        // --- Uniform Locations ---
        const timeLoc = gl.getUniformLocation(program, 'u_time');
        const viewLoc = gl.getUniformLocation(program, 'u_viewMatrix');
        const projLoc = gl.getUniformLocation(program, 'u_projectionMatrix');
        const lightDirLoc = gl.getUniformLocation(program, 'u_lightDir');

        // --- State Configuration ---
        gl.enable(gl.DEPTH_TEST);

        // Light direction: Entering diagonally from top-right-distant space
        const lightDirection = [1.0, 0.4, -0.6]; 

        // --- Render Loop ---
        function render(time) {
            time *= 0.001; // Convert to seconds

            // Handle Resize cleanly
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                gl.viewport(0, 0, canvas.width, canvas.height);
            }

            gl.clearColor(0.005, 0.008, 0.015, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

            gl.useProgram(program);
            gl.bindVertexArray(vao);

            // Update Dynamic Matrices
            const aspect = canvas.width / canvas.height;
            const projectionMatrix = createPerspectiveMatrix(Math.PI / 4, aspect, 0.1, 1000.0);
            const viewMatrix = createLookAtMatrix([0.0, 25.0, 50.0], [0.0, -2.0, 0.0], [0.0, 1.0, 0.0]);

            // Pass Uniforms
            gl.uniform1f(timeLoc, time);
            gl.uniformMatrix4fv(projLoc, false, new Float32Array(projectionMatrix));
            gl.uniformMatrix4fv(viewLoc, false, new Float32Array(viewMatrix));
            gl.uniform3fv(lightDirLoc, new Float32Array(lightDirection));

            // Draw Mesh
            gl.drawElements(gl.TRIANGLES, indices.length, gl.UNSIGNED_INT, 0);

            requestAnimationFrame(render);
        }

        requestAnimationFrame(render);
    </script>
</body>
</html>
